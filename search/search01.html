.h-search-wrap{width:500px;text-align:right;}

}

.search-wrap{max-width:800px;margin:0 auto;padding:7.15rem 0;transition:padding 0.3s ease;}
.search-wrap .search-hash{padding:18px 0 0;}
.close-sch-btn {position:fixed;z-index:100;right: 3%;top: 24px;width: 42px;height: 42px;transform:scale(0);opacity:0;transition:all .2s ease;overflow:hidden;}

.h-search-btn.open .h-ico-search{opacity:0;transform:scale(0);}
.search-box.open .close-sch-btn{transform:scale(1);opacity:1;}
